# Publishes @witness-ai/opencode (the OpenCode plugin, in npm/opencode/) to the
# PUBLIC npm registry on a GitHub Release, via npm Trusted Publishing (OIDC).
#
# No stored NPM_TOKEN: `id-token: write` lets npm mint a short-lived OIDC token,
# and provenance is generated automatically (so do NOT pass --provenance).
# Configure the matching trusted publisher for all three packages at npmjs.com:
# @witness-ai/opencode, @witness-ai/opencode-darwin-arm64, and
# @witness-ai/opencode-linux-x64. Each uses owner=IngTian, repo=witness, and
# workflow=npm-publish.yml.
# New platform packages need one manual bootstrap publish before their package-
# level Trusted Publishers can be configured; the publish steps are idempotent.
#
# Provenance requires npm/opencode/package.json's `repository` URL to match this
# repo (it does: git+https://github.com/IngTian/witness.git).
name: Publish @witness-ai/opencode to npm

on:
  release:
    types: [published]      # cut a GitHub Release (tag vX.Y.Z) to publish
  workflow_dispatch: {}     # manual run for testing the build path (guard skips the publish-version check)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # OIDC — the whole point: token-free trusted publishing + auto-provenance
    steps:
      - uses: actions/checkout@v4

      # The package's prepublishOnly cross-compiles the two supported npm targets
      # and stages their platform packages, so the Go toolchain must be present.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'                          # >= 22.14 required for trusted publishing
          registry-url: 'https://registry.npmjs.org'  # PUBLIC npm, not GitHub Packages

      # Trusted publishing needs npm >= 11.5.1 (newer than what Node 22 bundles).
      - run: npm install -g npm@latest

      # Fail fast if the release tag (vX.Y.Z) doesn't match the committed package
      # version — 0.0.1 is already published and immutable, so the tag must bump it.
      # Also guard the two Claude-plugin manifests: they carry their own version and
      # silently drift from the tag if bumped separately (issue #54 minor). Checking
      # them here keeps a single release surface consistent across npm + marketplace.
      - name: Verify release tag matches package versions
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          check() {
            local label="$1" got="$2"
            if [ "$tag" != "$got" ]; then
              echo "release tag ($tag) != $label version ($got)" >&2
              echo "bump $label to $tag (or tag v$got) and re-release." >&2
              exit 1
            fi
          }
          check "npm/opencode/package.json" "$(node -p "require('./npm/opencode/package.json').version")"
          check ".claude-plugin/plugin.json" "$(node -p "require('./.claude-plugin/plugin.json').version")"
          check ".claude-plugin/marketplace.json" "$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].version")"

      - name: Test and stage packages
        run: |
          npm --prefix npm/opencode run check
          ./scripts/stage-npm-opencode.sh --build
          npm pack ./npm/platform/darwin-arm64 --dry-run
          npm pack ./npm/platform/linux-x64 --dry-run
          npm pack ./npm/opencode --ignore-scripts --dry-run

      # Platform packages must exist before the main package references them as
      # optional dependencies. No NODE_AUTH_TOKEN or --provenance under OIDC.
      - name: Publish platform packages
        if: github.event_name == 'release'
        run: |
          version="$(node -p "require('./npm/opencode/package.json').version")"
          tag=latest
          case "$version" in *-*) tag="${version#*-}"; tag="${tag%%.*}" ;; esac
          publish_if_missing() {
            package="$1"
            directory="$2"
            if npm view "$package@$version" version >/dev/null 2>&1; then
              echo "$package@$version is already published; skipping"
              return
            fi
            npm publish "$directory" --tag "$tag"
          }
          publish_if_missing "@witness-ai/opencode-darwin-arm64" ./npm/platform/darwin-arm64
          publish_if_missing "@witness-ai/opencode-linux-x64" ./npm/platform/linux-x64

      - name: Publish main package
        if: github.event_name == 'release'
        working-directory: npm/opencode
        run: |
          version="$(node -p "require('./package.json').version")"
          tag=latest
          case "$version" in *-*) tag="${version#*-}"; tag="${tag%%.*}" ;; esac
          if npm view "@witness-ai/opencode@$version" version >/dev/null 2>&1; then
            echo "@witness-ai/opencode@$version is already published; skipping"
          else
            npm publish --ignore-scripts --tag "$tag"
          fi

      - name: Verify published packages and README
        if: github.event_name == 'release'
        run: |
          version="$(node -p "require('./npm/opencode/package.json').version")"
          packages=(
            "@witness-ai/opencode"
            "@witness-ai/opencode-darwin-arm64"
            "@witness-ai/opencode-linux-x64"
          )
          for package in "${packages[@]}"; do
            for attempt in {1..12}; do
              published="$(npm view "$package@$version" version 2>/dev/null || true)"
              [ "$published" = "$version" ] && break
              sleep 5
            done
            [ "$published" = "$version" ] || {
              echo "$package@$version is not visible on npm after 60 seconds" >&2
              exit 1
            }
          done

          readme="$(npm view "@witness-ai/opencode@$version" readmeFilename)"
          [ "$readme" = "README.md" ] || {
            echo "npm metadata does not identify README.md (got: $readme)" >&2
            exit 1
          }

          verify_dir="$(mktemp -d)"
          archive="$(npm pack "@witness-ai/opencode@$version" --ignore-scripts --pack-destination "$verify_dir" --silent)"
          tar -xOf "$verify_dir/$archive" package/README.md | grep -Fq "Supported platforms"
